# fly.toml app configuration file generated for webcafe on 2026-02-23T15:20:10+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'webcafe'
primary_region = 'fra'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "chat_data"
  destination = "/data"

[env]
  DATABASE_URL = "/data/webcafe.db"
  PORT = 8080